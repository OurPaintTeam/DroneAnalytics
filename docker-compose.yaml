services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    expose:
      - 8080
    networks:
      - DA-net
    env_file:
      - ./backend/.env
    depends_on:
      - elastic
    develop:
      watch:
        - action: rebuild
          path: ./backend
  elastic:
    build: ./elastic
    container_name: elastic
    expose:
      - 9200
    networks:
      - DA-net
    env_file:
      - ./configs/elastic.env
    volumes:
      - esdata:/usr/share/elasticsearch/data
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    expose:
      - 5173
    networks:
      - DA-net
    configs:
      - source: frontend
        target: /etc/nginx/conf.d/default.conf
    develop:
      watch:
        - action: rebuild
          path: ./frontend
  init-elastic:
    build:
      context: ./init-elastic
      dockerfile: Dockerfile
    container_name: init-elastic
    networks:
      - DA-net
    configs:
      - source: init-elastic
        target: /etc/init-elastic.yaml
    depends_on:
      - elastic
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: proxy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - DA-net
    configs:
      - source: proxy
        target: /etc/nginx/nginx.conf
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      init-elastic:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true

configs:
  frontend:
    file: ./configs/frontend.conf
  init-elastic:
    file: ./configs/init-elastic.yaml
  proxy:
    file: ./configs/proxy.conf


volumes:
  esdata:

networks:
  DA-net:
    driver: bridge
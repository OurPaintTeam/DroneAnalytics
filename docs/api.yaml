components:
  responses:
    ValidationError:
      description: Bad Request - validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnauthorizedError:
      description: Unauthorized - authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    LogStorageError:
      description: Bad Gateway - log storage service unavailable or returned an error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'


  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    refresh: # It is necessary for /auth/refresh
      type: apiKey
      in: cookie
      name: refresh_token

  schemas:
    message:
      type: string
      minLength: 1
      maxLength: 1024
      description: Use only english
    access_token:
      type: string
      minLength: 16
      maxLength: 1024
    refresh_token:
      type: string
      minLength: 16
      maxLength: 1024
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 4
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 64
      required: [username, password]
    apiVersion:
      type: string
      description: API version
      default: 1.1.0
      minLength: 5
      maxLength: 8

    severity:
      type: string
      enum: ["debug", "info", "notice", "warning", "error", "critical", "alert", "emergency"]
      description: severity of event - Like syslog

    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Application-specific error code.
          minimum: 200
          maximum: 599
        message:
          $ref: '#/components/schemas/message'
      required: [code, message]

    timestamp:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds
      minimum: 0

    drone:
      type: string
      description: Type of drone
      enum: ["delivery", "queen", "inspector", "agriculture"]

    service:
      type: string
      description: Type of service
      enum: ["delivery", "queen", "inspector", "agriculture", "GCS", "aggregator", "insurance", "regulator",
             "dronePort", "OrAT_drones", "operator", "SITL", "Gazebo", "infopanel", "registry"]
    battery:
      type: integer
      format: int8
      description: battery level in percents
      minimum: 0
      maximum: 100
    pitch:
      type: number
      format: double
      description: pitch clockwise angle in degrees
      minimum: -90
      maximum: 90
    roll:
      type: number
      format: double
      description: roll clockwise angle in degrees
      minimum: -180
      maximum: 180
    course:
      type: number
      format: double
      description: angle between magnetic north and aircraft axis
      minimum: 0
      maximum: 360
    latitude:
      type: number
      format: double
      description: + north / - south latitude
      minimum: -90
      maximum: 90
    longitude:
      type: number
      format: double
      description: + east / - west longitude
      minimum: -180
      maximum: 180
    id:
      type: integer
      minimum: 1
      maximum: 1000
      format: int64
      description: ID of drone or service. For example, we a have 3 delivery drones, then drone_id will be 1, 2, 3.

    limit:
      type: integer
      minimum: 1
      maximum: 100
      default: 10

    page:
      type: integer
      minimum: 1
      default: 1

    BasicLog:
      type: object
      additionalProperties: false
      properties:
        timestamp:
          $ref: '#/components/schemas/timestamp'
        message:
          $ref: '#/components/schemas/message'
      required: [timestamp, message]
    GetEventLog:
      type: object
      additionalProperties: false
      properties:
        timestamp:
          $ref: '#/components/schemas/timestamp'
        service:
          $ref: '#/components/schemas/service'
        service_id:
          $ref: '#/components/schemas/id'
        severity:
          $ref: '#/components/schemas/severity'
        message:
          $ref: '#/components/schemas/message'
      required: [timestamp, service, service_id, message]

    Token:
      type: object
      properties:
        access_token:
          $ref: '#/components/schemas/access_token'
        token_type:
          type: string
          default: "Bearer"
          maxLength: 16
        expires_in:
          type: integer
          format: int64
          description: Access token lifetime in seconds
          minimum: 60
          maximum: 86400
      required: [access_token, refresh_token]
    AcceptedResponse:
      type: object
      properties:
        total:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
          description: Total number of log received
        accepted:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
          description: Number of log entries successfully indexed
        rejected:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
          description: Number of log entries rejected
        errors:
          type: array
          minItems: 0
          maxItems: 1000
          items:
            type: object
            properties:
              index:
                type: integer
                format: int32
                minimum: 0
                maximum: 1000
              reason:
                type: string
                maxLength: 64
                description: Reason of rejection
      required:
        - accepted
    height:
      type: number
      format: double
      minimum: 0
      maximum: 500000
      description: height in meters

openapi: 3.0.0
info:
  title: DroneAnalytics API
  description: Service for visualizing drone data for discipline "Cyberimmune Systems Software Engineering"
  contact:
    name: "Erkhov A. A. - Admin"
    url: "https://github.com/SashaErkhov"
    email: "sasori654654@gmail.com"
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: 1.1.0

servers:
  - url: https://localhost/api
    description: dev
  - url: https://infopanel.csse.ru/api
    description: prod

tags:
  - name: auth
    description: registration and authentication.
  - name: log
    description: logs.
  - name: analytics
    description: analytics for frontend.
  - name: download
    description: download some data

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: login and receive access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Tokens issued
          headers:
            Set-Cookie:
              description: refresh token
              schema:
                $ref: '#/components/schemas/refresh_token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        400:
          $ref: '#/components/responses/ValidationError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
  /auth/refresh:
    post:
      tags: [auth]
      summary: update access token
      security:
        - refresh: []
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          description: refresh token
          schema:
            $ref: '#/components/schemas/refresh_token'
      responses:
        200:
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        400:
          $ref: '#/components/responses/ValidationError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
  /auth/logout:
    post:
      tags: [auth]
      summary: logout
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK

  /log/telemetry:
    post:
      security:
        - ApiKeyAuth: []
      tags: [ log ]
      summary: telemetry of drone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 1000
              items:
                type: object
                additionalProperties: false
                properties:
                  apiVersion:
                    $ref: '#/components/schemas/apiVersion'
                  timestamp:
                    $ref: '#/components/schemas/timestamp'
                  drone:
                    $ref: '#/components/schemas/drone'
                  drone_id:
                    $ref: '#/components/schemas/id'
                  battery:
                    $ref: '#/components/schemas/battery'
                  pitch:
                    $ref: '#/components/schemas/pitch'
                  roll:
                    $ref: '#/components/schemas/roll'
                  course:
                    $ref: '#/components/schemas/course'
                  latitude:
                    $ref: '#/components/schemas/latitude'
                  longitude:
                    $ref: '#/components/schemas/longitude'
                  height:
                    $ref: '#/components/schemas/height'
                required: [ timestamp, drone, drone_id, latitude, longitude, apiVersion ]
      responses:
        200:
          description: All logs accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        207:
          description: Some logs were rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        400:
          $ref: '#/components/responses/ValidationError'
        502:
          $ref: '#/components/responses/LogStorageError'
    get:
      security:
        - BearerAuth: []
      tags: [ analytics ]
      summary: get telemetry logs
      description: Returns telemetry logs sorted by timestamp
      parameters:
        - in: query
          name: limit
          schema:
            $ref: '#/components/schemas/limit'
        - in: query
          name: page
          schema:
            $ref: '#/components/schemas/page'
        - in: query
          name: from_ts
          schema:
            $ref: '#/components/schemas/timestamp'
        - in: query
          name: to_ts
          schema:
            $ref: '#/components/schemas/timestamp'
        - in: query
          name: drone
          schema:
            $ref: '#/components/schemas/drone'
        - in: query
          name: drone_id
          schema:
            $ref: '#/components/schemas/id'
          
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    timestamp:
                      $ref: '#/components/schemas/timestamp'
                    drone:
                      $ref: '#/components/schemas/drone'
                    drone_id:
                      $ref: '#/components/schemas/id'
                    battery:
                      $ref: '#/components/schemas/battery'
                    pitch:
                      $ref: '#/components/schemas/pitch'
                    roll:
                      $ref: '#/components/schemas/roll'
                    course:
                      $ref: '#/components/schemas/course'
                    latitude:
                      $ref: '#/components/schemas/latitude'
                    longitude:
                      $ref: '#/components/schemas/longitude'
                    height:
                      $ref: '#/components/schemas/height'
                  required: [ timestamp, drone, drone_id, latitude, longitude ]
        401:
          $ref: '#/components/responses/UnauthorizedError'
        400:
          $ref: '#/components/responses/ValidationError'
        502:
          $ref: '#/components/responses/LogStorageError'
